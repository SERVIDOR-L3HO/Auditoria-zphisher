kind = "web"
previewPath = "/"
title = "PhishAudit Pro"
version = "1.0.0"
id = "artifacts/phish-audit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24315

[services.development]
run = "pnpm --filter @workspace/phish-audit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phish-audit", "run", "build" ]
publicDir = "artifacts/phish-audit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24315"
BASE_PATH = "/"
